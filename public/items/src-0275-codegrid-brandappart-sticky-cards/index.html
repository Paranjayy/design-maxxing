<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrandAppart Sticky Cards | Codegrid</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="intro">
      <h1>Enter the Frame</h1>
    </section>

    <section class="sticky-cards">
      <div class="card" id="card-1">
        <div class="col">
          <p>Quiet Control</p>
          <h1>Signal Drift</h1>
        </div>
        <div class="col">
          <img src="/card-img-1.jpg" alt="" />
        </div>
      </div>
      <div class="card" id="card-2">
        <div class="col">
          <p>Fluid Structures</p>
          <h1>Skyline Drift</h1>
        </div>
        <div class="col">
          <img src="/card-img-2.jpg" alt="" />
        </div>
      </div>
      <div class="card" id="card-3">
        <div class="col">
          <p>Wired Thought</p>
          <h1>Neural Assembly</h1>
        </div>
        <div class="col">
          <img src="/card-img-3.jpg" alt="" />
        </div>
      </div>
      <div class="card" id="card-4">
        <div class="col">
          <p>Silent Repetition</p>
          <h1>Learning Loop</h1>
        </div>
        <div class="col">
          <img src="/card-img-4.jpg" alt="" />
        </div>
      </div>
    </section>

    <section class="outro">
      <h1>Loop Complete</h1>
    </section>
    <script type="module" src="/script.js"></script>
  </body>
</html>
