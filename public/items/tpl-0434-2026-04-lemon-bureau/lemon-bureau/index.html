<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemon Bureau | Codegrid</title>
    <meta name="author" content="Codegrid" />
    <meta name="description" content="MWT April 2026 by Codegrid" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="icon" type="image/png" href="/icons/site-icon.png" />
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/preloader.css" />
    <link rel="stylesheet" href="/css/nav.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/footer.css" />
  </head>
  <body>
    <!-- home: preloader -->
    <div class="preloader" aria-hidden="true">
      <div class="intro-title">
        <h1>Lemon Bureau</h1>
      </div>
    </div>

    <div class="split-overlay" aria-hidden="true">
      <div class="intro-title">
        <h1>Lemon Bureau</h1>
      </div>
    </div>

    <div class="tags-overlay" aria-hidden="true">
      <div class="tag tag-1"><p>Citrus Data</p></div>
      <div class="tag tag-2"><p>Peel Network</p></div>
      <div class="tag tag-3"><p>Sour Active</p></div>
    </div>

    <!-- home: navigation -->
    <nav>
      <div class="nav-logo">
        <a href="/">
          <img src="/logo/nav-logo.svg" alt="nav logo" />
        </a>
      </div>
      <div class="nav-icon">
        <img src="/icons/nav-icon.png" alt="nav icon" />
      </div>
      <div class="nav-toggler">
        <p>Menu</p>
      </div>
    </nav>

    <!-- home: hero -->
    <section class="hero">
      <div class="hero-header">
        <h1
          data-animate-variant="slide-words"
          data-animate-on-scroll="false"
          data-animate-delay="0.8"
          data-animate-stagger="0.1"
        >
          Lemon Bureau
        </h1>
      </div>
      <div class="hero-footer">
        <div class="hero-footer-col">
          <p
            data-animate-variant="slide"
            data-animate-on-scroll="false"
            data-animate-delay="1"
          >
            Ctrl + Yellow
          </p>
          <p
            data-animate-variant="slide"
            data-animate-on-scroll="false"
            data-animate-delay="1.1"
          >
            Zest Engine Ready
          </p>
        </div>
        <div class="hero-footer-col">
          <p
            data-animate-variant="slide"
            data-animate-on-scroll="false"
            data-animate-delay="1.2"
          >
            © Yellow Dept
          </p>
        </div>
      </div>
    </section>

    <script type="module" src="/js/lenis-scroll.js"></script>
    <script type="module" src="/js/cursor.js"></script>
    <script type="module" src="/js/animated-copy.js"></script>
    <script type="module" src="/js/simulation.js"></script>
    <script type="module" src="/js/particle-visual.js"></script>
    <script type="module" src="/js/nav.js"></script>
    <script type="module" src="/js/home-hero.js"></script>
    <script type="module" src="/js/team-cards.js"></script>
    <script type="module" src="/js/clients.js"></script>
    <script type="module" src="/js/footer.js"></script>
    <script type="module" src="/js/preloader.js"></script>
  </body>
</html>
