<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeroWallet Scroll Animation </title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="intro">
      <h1>Blink and you'll miss it</h1>
    </section>

    <section class="spotlight">
      <div class="spotlight-content spotlight-content-in">
        <h2>Wait for it</h2>
        <p>
          The good part is closer, just one scroll away. Don't blink, or you'll
          miss the moment it turns.
        </p>
      </div>

      <div class="spotlight-content spotlight-content-out">
        <h2>There it is</h2>
        <p>
          That's the kind of payoff worth holding out for. Clean, sharp, and
          right when you needed it.
        </p>
      </div>

      <div class="strokes">
        <svg
          viewBox="0 0 1600 900"
          preserveAspectRatio="xMidYMid slice"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g fill="none" stroke="#FFF280" stroke-linecap="round">
            <path
              class="stroke"
              d="M -251 -42 C 156 -405 595 -695 1176 -648"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M -195 90 C 212 -273 651 -562 1232 -516"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M -138 223 C 269 -140 707 -430 1288 -383"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M -82 355 C 325 -8 764 -297 1345 -250"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M -26 488 C 381 125 820 -165 1401 -118"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 30 620 C 438 257 876 -32 1457 15"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 87 753 C 494 390 932 101 1513 147"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 143 885 C 550 522 989 233 1570 280"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 199 1018 C 606 655 1045 366 1626 412"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 255 1150 C 663 788 1101 498 1682 545"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 312 1283 C 719 920 1157 631 1738 677"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 368 1416 C 775 1053 1214 763 1795 810"
              stroke-width="150"
            />
            <path
              class="stroke"
              d="M 424 1548 C 831 1185 1270 896 1851 942"
              stroke-width="150"
            />
          </g>
        </svg>
      </div>

      <svg
        class="sparkles"
        viewBox="0 0 1600 900"
        preserveAspectRatio="xMidYMid slice"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g
          fill="#fff"
          stroke="#141414"
          stroke-width="4"
          stroke-linejoin="round"
        >
          <g transform="translate(360 230) scale(1.5)">
            <path
              class="sparkle"
              vector-effect="non-scaling-stroke"
              d="M 0 -55 C 8 -16 16 -8 55 0 C 16 8 8 16 0 55 C -8 16 -16 8 -55 0 C -16 -8 -8 -16 0 -55 Z"
            />
          </g>
          <g transform="translate(1180 520) scale(1)">
            <path
              class="sparkle"
              vector-effect="non-scaling-stroke"
              d="M 0 -55 C 8 -16 16 -8 55 0 C 16 8 8 16 0 55 C -8 16 -16 8 -55 0 C -16 -8 -8 -16 0 -55 Z"
            />
          </g>
          <g transform="translate(640 730) scale(0.65)">
            <path
              class="sparkle"
              vector-effect="non-scaling-stroke"
              d="M 0 -55 C 8 -16 16 -8 55 0 C 16 8 8 16 0 55 C -8 16 -16 8 -55 0 C -16 -8 -8 -16 0 -55 Z"
            />
          </g>
        </g>
      </svg>
    </section>

    <section class="outro">
      <h1>Told you it was worth it</h1>
    </section>

    <script type="module" src="/script.js"></script>
  </body>
</html>
